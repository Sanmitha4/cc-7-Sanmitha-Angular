<section class="listing">
  <img class="listing-photo" [src]="housingLocation().photo" alt="Photo of {{housingLocation().name}}">

  @if (housingLocation().wifi) {
    <span class="wifi-badge">📶</span>
  } @else {
    <span class="no-wifi"></span>
  }


  <h2 class="listing-heading">{{ housingLocation().name }}</h2>
  <p class="listing-location">{{ housingLocation().city }}, {{ housingLocation().state }}</p>
  
  <button class="primary" type="button" (click)="handleButtonClick($event)">Details
  </button>
</section>
