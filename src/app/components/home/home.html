<section>
  <form>
    <input type="text" placeholder="Filter by city" />
    <button class="primary" type="button">Search</button>
  </form>
</section>
<section>
  <label> EditMode
    <input type="checkbox" (select)="handleCheckBox($event)"/>
  </label>
  

</section>
<section class="results">
  @for (housingLocation of  locationService.getAllLocations(); track housingLocation.id) {
    <app-housing-location
      [housingLocation]="housingLocation"
      (onLocationClick)="handleLocationClick($event)"
    />
  } @empty {
    <h2>There are no items to display</h2>
  }
</section>
